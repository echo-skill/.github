<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>echoskill — AI Agent Skills Marketplace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D1117;
      color: #E6EDF3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 520px;
      text-align: center;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #58A6FF, #3FB9CF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 1rem;
      color: #8B949E;
      margin-bottom: 2rem;
    }
    .description {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #C9D1D9;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.2rem 0.7rem;
      border-radius: 10px;
      font-weight: 500;
      background: #3D2E00;
      color: #D29922;
      margin-bottom: 2rem;
    }
    footer {
      color: #484F58;
      font-size: 0.8rem;
      margin-top: 2rem;
    }
    footer a {
      color: #58A6FF;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <img src="brand/echo-skill-logo-512.png" alt="echoskill logo" class="logo">
    <h1>echoskill</h1>
    <p class="tagline">AI agent skills marketplace</p>
    <span class="badge">coming soon</span>
    <p class="description">
      A public registry of reusable skills for AI coding agents.
      Discover, share, and install capabilities for Claude Code,
      Gemini CLI, and other MCP-compatible clients.
    </p>
    <footer>Part of the <a href="https://echomodel.ai">echomodel</a> ecosystem</footer>
  </div>
</body>
</html>
